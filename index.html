<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Persönliches Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1><span class="pulse"></span> Persönliches Dashboard</h1>
  <div class="header-right">
    <span id="updateTime">Wird geladen...</span>
    <button class="refresh-btn" onclick="refreshAll()">
      <span id="refreshIcon">↻</span> Aktualisieren
    </button>
  </div>
</header>

<div class="section-title">Marktdaten</div>
<div class="grid">

  <div class="card orange">
    <div class="card-header">
      <div class="card-title">🛢️ Heizölpreis</div>
      <span class="badge loading" id="badge-heizoel">Lädt...</span>
    </div>
    <div id="heizoel-main" class="skeleton"></div>
    <div id="heizoel-sub" class="sub-value"></div>
  </div>

  <div class="card blue">
    <div class="card-header">
      <div class="card-title">💱 EUR / USD</div>
      <span class="badge loading" id="badge-usd">Lädt...</span>
    </div>
    <div id="usd-main" class="skeleton"></div>
    <div id="usd-sub" class="sub-value"></div>
  </div>

  <div class="card purple">
    <div class="card-header">
      <div class="card-title">🇹🇷 EUR / TRY</div>
      <span class="badge loading" id="badge-try">Lädt...</span>
    </div>
    <div id="try-main" class="skeleton"></div>
    <div id="try-sub" class="sub-value"></div>
  </div>

</div>

<div class="section-title">Wetter</div>
<div class="grid">

  <div class="card green">
    <div class="card-header">
      <div class="card-title">🗽 Jersey City</div>
      <span class="badge loading" id="badge-jc">Lädt...</span>
    </div>
    <div class="weather-row">
      <div class="weather-icon" id="icon-jc">⏳</div>
      <div>
        <div id="temp-jc" class="skeleton"></div>
        <div id="sub-jc" class="sub-value"></div>
      </div>
    </div>
  </div>

  <div class="card green">
    <div class="card-header">
      <div class="card-title">🗽 New York City</div>
      <span class="badge loading" id="badge-nyc">Lädt...</span>
    </div>
    <div class="weather-row">
      <div class="weather-icon" id="icon-nyc">⏳</div>
      <div>
        <div id="temp-nyc" class="skeleton"></div>
        <div id="sub-nyc" class="sub-value"></div>
      </div>
    </div>
  </div>

  <div class="card teal">
    <div class="card-header">
      <div class="card-title">🇩🇪 Wiesbaden</div>
      <span class="badge loading" id="badge-wi">Lädt...</span>
    </div>
    <div class="weather-row">
      <div class="weather-icon" id="icon-wi">⏳</div>
      <div>
        <div id="temp-wi" class="skeleton"></div>
        <div id="sub-wi" class="sub-value"></div>
      </div>
    </div>
  </div>

  <div class="card teal">
    <div class="card-header">
      <div class="card-title">🇩🇪 Mainz</div>
      <span class="badge loading" id="badge-mz">Lädt...</span>
    </div>
    <div class="weather-row">
      <div class="weather-icon" id="icon-mz">⏳</div>
      <div>
        <div id="temp-mz" class="skeleton"></div>
        <div id="sub-mz" class="sub-value"></div>
      </div>
    </div>
  </div>

</div>

<div class="footer">Daten via Render.com Backend · Auto-Refresh alle 5 Min · Kostenloses Setup</div>

<script src="script.js"></script>
</body>
</html>
